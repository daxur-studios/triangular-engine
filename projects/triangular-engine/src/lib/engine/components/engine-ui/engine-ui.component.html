<!--UI-->

<div class="ui-layer-1 flex-page">
  <div class="ui-toolbar-top">
    <engine-portal-outlet area="top" />

    @if (engineService.options.showFPS) {
      <engine-stats />
    }
  </div>
  <div class="main-wrapper flex-page">
    <div class="ui-sidebar-left">
      <engine-portal-outlet area="left" />
    </div>
    <div class="ui-main">
      <engine-portal-outlet area="main" />
    </div>
    <div class="ui-sidebar-right">
      @if (userInterface().showSceneTree) {
        <sceneTree />
      }
      <engine-portal-outlet area="right" />
    </div>
  </div>

  <div class="ui-toolbar-bottom">
    <engine-portal-outlet area="bottom" />
  </div>
</div>

<div class="ui-layer-modal">
  <engine-portal-outlet area="modal" />
</div>

<div class="ui-layer-notification">
  <engine-portal-outlet area="notification" />
</div>
