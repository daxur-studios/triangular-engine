<!--UI-->

<div class="ui-layer-1 flex-page">
  <div class="ui-toolbar-top">
    <portalOutlet area="toolbarTop" />
  </div>
  <div class="main-wrapper flex-page">
    <div class="ui-sidebar-left">
      <portalOutlet area="leftSidebar" />
    </div>
    <div class="ui-main">
      <portalOutlet area="main" />

      <div class="ui-layer-overlay">
        <div class="engine-overlay-lane engine-overlay-lane--top-start">
          <portalOutlet area="overlay" [lanes]="['topStart']" />
        </div>
        <div class="engine-overlay-lane engine-overlay-lane--top-end">
          <portalOutlet area="overlay" [lanes]="['topEnd']" />
        </div>
        <div class="engine-overlay-lane engine-overlay-lane--center">
          <portalOutlet area="overlay" [lanes]="['center']" />
        </div>
        <div class="engine-overlay-lane engine-overlay-lane--bottom-start">
          <portalOutlet area="overlay" [lanes]="['bottomStart']" />
        </div>
        <div class="engine-overlay-lane engine-overlay-lane--bottom-end">
          <portalOutlet area="overlay" [lanes]="['bottomEnd']" />
        </div>
      </div>
    </div>
    <div class="ui-sidebar-right">
      @if (userInterface().showSceneTree) {
        <sceneTree />
      }
      <portalOutlet area="rightSidebar" />
    </div>
  </div>

  <div class="ui-toolbar-bottom">
    <portalOutlet area="toolbarBottom" />
  </div>
</div>

@if (engineService.options.showFPS) {
  <ng-template portalTarget="overlay" lane="topEnd" [order]="0">
    <engine-stats />
  </ng-template>
}

<div class="ui-layer-modal">
  <portalOutlet area="modal" />
</div>

<div class="ui-layer-notification">
  <portalOutlet area="notification" />
</div>
