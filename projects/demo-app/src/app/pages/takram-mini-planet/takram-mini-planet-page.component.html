<scene>
  <ng-template enginePortal="right" lane="content">
    <app-takram-cloud-controls [showSceneLightingControls]="true" />
  </ng-template>

  <ng-template enginePortal="top" lane="content">
    <aside class="demo-status">
      <strong>Mini planet · hybrid clouds</strong>
      <span>Camera altitude {{ cameraAltitude() | number: '1.0-0' }} m</span>
      <span>2D cloud shell {{ shellOpacity() | percent: '1.0-0' }}</span>
      <small>Only the exterior texture fades; Takram remains unchanged.</small>
    </aside>
  </ng-template>

  <orbitControls
    [cameraPosition]="[0, 3000, 8000]"
    [target]="surfaceTarget"
    [upVector]="[0, 1, 0]"
    [fov]="controls.cameraFov()"
    [near]="controls.cameraNear()"
    [far]="controls.cameraFar()"
  />

  <postprocessing-composer [enableNormalPass]="true">
    <takram-atmosphere
      [planetRadius]="planetRadius"
      [atmosphereHeight]="atmosphereHeight"
      [sunDirection]="controls.sunDirection()"
    >
      <takram-sun-light [intensity]="1.4" />
      <takram-sky-light [intensity]="0.65" />

      <mesh [position]="planetCentre">
        <sphereGeometry
          [params]="{ radius: planetRadius, widthSegments: 96, heightSegments: 64 }"
        />
        <meshBasicMaterial [params]="{ color: '#28618b' }" />
      </mesh>

      <takram-clouds
        [localWeatherTexture]="textures.selectedTexture()"
        [coverage]="controls.coverage()"
        [qualityPreset]="controls.qualityPreset()"
        [resolutionScale]="controls.resolutionScale()"
        [temporalUpscale]="controls.temporalUpscale()"
        [shapeDetail]="controls.shapeDetail()"
        [turbulence]="controls.turbulence()"
        [haze]="controls.haze()"
        [lightShafts]="controls.lightShafts()"
        [localWeatherVelocity]="[controls.localWeatherVelocityX(), 0]"
        [shadowCascadeCount]="1"
      >
        <takram-cloud-layer
          channel="r"
          [altitude]="controls.altitude()"
          [height]="controls.height()"
          [densityScale]="controls.densityScale()"
          [shadow]="true"
        />
      </takram-clouds>

      <mesh [position]="planetCentre" [renderOrder]="10">
        <sphereGeometry
          [params]="{
            radius: cloudShellRadius,
            widthSegments: 96,
            heightSegments: 64
          }"
        />
        <meshBasicMaterial
          map="/planet-clouds/cloud-opacity-map.png"
          alphaMap="/planet-clouds/cloud-opacity-map.png"
          [params]="shellMaterial()"
        />
      </mesh>

      <takram-aerial-perspective
        [sky]="true"
        [sunLight]="true"
        [skyLight]="true"
        [cloudShadows]="controls.cloudShadows()"
      />
    </takram-atmosphere>
    <toneMappingEffect />
  </postprocessing-composer>
</scene>
