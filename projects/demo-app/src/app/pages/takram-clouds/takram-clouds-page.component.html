<scene>
  <ng-template enginePortal="right" lane="content">
    <app-takram-cloud-controls />
  </ng-template>

  <ng-template enginePortal="top" lane="content">
    <aside class="demo-status">
      <strong>Takram adapter · declarative</strong>
      <span>Spike-matched camera and composition · pixel ratio 1 · resolution 0.5</span>
    </aside>
  </ng-template>

  <orbitControls
    [cameraPosition]="[0, 100, 1500]"
    [target]="[0, 800, 0]"
    [upVector]="[0, 1, 0]"
    [fov]="controls.cameraFov()"
    [near]="controls.cameraNear()"
    [far]="controls.cameraFar()"
  />

  <postprocessing-composer>
    <takram-atmosphere>
      <takram-clouds
        [qualityPreset]="controls.qualityPreset()"
        [coverage]="controls.coverage()"
        [resolutionScale]="controls.resolutionScale()"
        [temporalUpscale]="controls.temporalUpscale()"
        [shapeDetail]="controls.shapeDetail()"
        [turbulence]="controls.turbulence()"
        [haze]="controls.haze()"
        [lightShafts]="controls.lightShafts()"
        [localWeatherVelocity]="[controls.localWeatherVelocityX(), 0]"
        [shadowCascadeCount]="0"
      >
        <takram-cloud-layer
          channel="r"
          [altitude]="controls.altitude()"
          [height]="controls.height()"
          [densityScale]="controls.densityScale()"
          [shadow]="false"
        />
      </takram-clouds>

      <takram-aerial-perspective [sky]="true" [cloudShadows]="false" />
    </takram-atmosphere>
    <toneMappingEffect />
  </postprocessing-composer>
</scene>
