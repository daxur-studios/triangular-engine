<scene>
  <ng-template enginePortal="right" lane="content">
    <app-takram-cloud-controls [showSceneLightingControls]="true" />
  </ng-template>

  <ng-template enginePortal="top" lane="content">
    <aside class="demo-status">
      <strong>Takram adapter · declarative</strong>
      <span
        >Spike-matched camera and composition · pixel ratio 1 · resolution
        0.5</span
      >
    </aside>
  </ng-template>

  <orbitControls
    [cameraPosition]="[0, 100, 1500]"
    [target]="[0, 800, 0]"
    [upVector]="[0, 1, 0]"
    [fov]="controls.cameraFov()"
    [near]="controls.cameraNear()"
    [far]="controls.cameraFar()"
  />

  <postprocessing-composer [enableNormalPass]="true">
    <takram-atmosphere [sunDirection]="controls.sunDirection()">
      @if (!controls.takramLighting()) {
        <takram-sun-light [intensity]="1.5" />
        <takram-sky-light [intensity]="0.7" />
      }

      <mesh [position]="[0, 0, 0]" [receiveShadow]="true">
        <planeGeometry [params]="[5000, 5000]" orientation="horizontal" />
        @if (controls.takramLighting()) {
          <meshBasicMaterial [params]="{ color: '#73806b' }" />
        } @else {
          <meshStandardMaterial
            [params]="{ color: '#73806b', roughness: 0.9, metalness: 0 }"
          />
        }
      </mesh>
      <mesh [position]="[-350, 150, 0]" [castShadow]="true">
        <boxGeometry [params]="[250, 300, 250]" />
        @if (controls.takramLighting()) {
          <meshBasicMaterial [params]="{ color: '#b58b62' }" />
        } @else {
          <meshStandardMaterial
            [params]="{ color: '#b58b62', roughness: 0.75, metalness: 0 }"
          />
        }
      </mesh>
      <mesh [position]="[300, 100, -150]" [castShadow]="true">
        <boxGeometry [params]="[180, 200, 180]" />
        @if (controls.takramLighting()) {
          <meshBasicMaterial [params]="{ color: '#8296a8' }" />
        } @else {
          <meshStandardMaterial
            [params]="{ color: '#8296a8', roughness: 0.65, metalness: 0 }"
          />
        }
      </mesh>

      <takram-clouds
        [localWeatherTexture]="textures.selectedTexture()"
        [qualityPreset]="controls.qualityPreset()"
        [coverage]="controls.coverage()"
        [resolutionScale]="controls.resolutionScale()"
        [temporalUpscale]="controls.temporalUpscale()"
        [shapeDetail]="controls.shapeDetail()"
        [turbulence]="controls.turbulence()"
        [haze]="controls.haze()"
        [lightShafts]="controls.lightShafts()"
        [localWeatherVelocity]="[controls.localWeatherVelocityX(), 0]"
        [shadowCascadeCount]="1"
      >
        <takram-cloud-layer
          channel="r"
          [altitude]="controls.altitude()"
          [height]="controls.height()"
          [densityScale]="controls.densityScale()"
          [shadow]="true"
        />
      </takram-clouds>

      <takram-aerial-perspective
        [sky]="true"
        [sunLight]="controls.takramLighting()"
        [skyLight]="controls.takramLighting()"
        [cloudShadows]="controls.cloudShadows()"
      />
    </takram-atmosphere>
    <toneMappingEffect />
  </postprocessing-composer>
</scene>
